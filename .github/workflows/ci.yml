name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────
  # Go 单元测试（仅不依赖数据库的包）
  # ────────────────────────────────────────────────
  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        env:
          CONFIG_PATH: ${{ github.workspace }}/configs/config.toml
        run: |
          go test ./test/zlog/...
          go test ./test/config/...

  # ────────────────────────────────────────────────
  # Docker build 验证（只构建不推送）
  # ────────────────────────────────────────────────
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-go]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./web/chat-server
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
