server {
    listen 80;
    server_name _;

    # Vue SPA：所有路径都返回 index.html，让 Vue Router 处理
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # 反向代理：将 /api/ 开头的请求转发给 Go 后端
    # proxy_pass 末尾的 / 会把 /api/ 前缀剥掉，后端只看到原始路径
    # proxy_ssl_verify off：后端用自签名证书，不做校验
    location /api/ {
        proxy_pass         https://backend:8000/;
        proxy_ssl_verify   off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket 反向代理：/wss 转给后端
    location /wss {
        proxy_pass             https://backend:8000/wss;
        proxy_ssl_verify       off;
        proxy_http_version     1.1;
        # 关键：告诉 nginx 升级为 WebSocket 协议
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host $host;
        proxy_read_timeout     3600s;  # WebSocket 长连接，超时设长一点
    }
}
