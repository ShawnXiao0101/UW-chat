[mainConfig]
appName = "KamaChat"
host = "0.0.0.0"
port = 8000
# 容器内路径，由 Dockerfile COPY 进去
tlsCertFile = "/app/pkg/ssl/127.0.0.1+1.pem"
tlsKeyFile  = "/app/pkg/ssl/127.0.0.1+1-key.pem"

[mysqlConfig]
# host 使用 docker-compose 里的服务名，Docker 内部 DNS 会自动解析
host = "mysql"
port = 3306
user = "root"
password = "kamachat123"
databaseName = "kama_chat"

[redisConfig]
# host 使用 docker-compose 里的服务名
host = "redis"
port = 6379
password = ""
db = 0

[authCodeConfig]
accessKeyID = "your accessKeyID in alibaba cloud"
accessKeySecret = "your accessKeySecret in alibaba cloud"
signName = "阿里云短信测试"
templateCode = "SMS_154950909"

[logConfig]
logPath = "/app/logs"

[kafkaConfig]
messageMode = "channel"
hostPort = "127.0.0.1:9092"
loginTopic = "login"
chatTopic = "chat_message"
logoutTopic = "logout"
partition = 0
timeout = 1

[staticSrcConfig]
staticAvatarPath = "/app/static/avatars"
staticFilePath = "/app/static/files"
